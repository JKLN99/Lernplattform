<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktive Lernplattform</title>
    <style>
        /* --- ALLGEMEINES STYLING --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0e6d2; /* Leichtes Pergament-Gelb */
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1, h2 {
            color: #8b0000; /* Römisches Rot */
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        /* --- STARTSEITE / QUEST-MAP --- */
        .map-grid {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .quest-card {
            background: #8b0000;
            color: white;
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 40%;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .quest-card:hover {
            transform: scale(1.05);
            background: #a00000;
        }

        /* --- MATERIAL-SEITE & KÄSTEN --- */
        .btn-back {
            background: #555;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .material-box {
            background: #fdfdfd;
            border-left: 5px solid #2b579a; /* Blau für Darstellung */
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .source-box {
            background: #fffaf0;
            border-left: 5px solid #b91d47; /* Dunkelrot für Quelle */
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .task-box {
            background: #f4f4f4;
            border-left: 5px solid #555;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 0 8px 8px 0;
        }

        .task-box h3 {
            margin-top: 0;
            color: #333;
        }

        /* --- IMAGE STYLING --- */
        .image-container {
            text-align: center;
            margin: 25px 0;
            padding: 10px;
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .material-img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .image-caption {
            font-size: 0.85em;
            color: #555;
            margin-top: 10px;
            font-style: italic;
            line-height: 1.4;
            padding: 0 10px;
        }

        /* --- TEXT MIT ZEILENANGABEN (BLOCKSATZ) --- */
        .text-with-lines {
            text-align: justify; /* Blocksatz */
            line-height: 1.6;
        }

        .line-p {
            margin: 0 0 8px 0;
            display: flex;
            align-items: flex-start;
        }

        .line-number {
            font-size: 0.85em;
            color: #777;
            width: 30px;
            min-width: 30px;
            user-select: none;
            text-align: right;
            padding-right: 15px;
            font-family: monospace;
            margin-top: 3px;
        }

        .line-text {
            flex-grow: 1;
        }

        /* --- NOTIZBUCH --- */
        .notebook-toggle {
            background: #d4af37; /* Gold */
            color: #111;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .notebook {
            background: #fffdf0;
            border: 2px dashed #d4af37;
            padding: 20px;
            margin-top: 15px;
            border-radius: 8px;
        }

        .notebook textarea {
            width: 100%;
            height: 120px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
            box-sizing: border-box;
            resize: vertical;
            font-family: inherit;
        }

        .btn-save {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">

    <div id="start-page">
        <h1>Das Römische Reich</h1>
        <p style="text-align: center;">Wähle eine Mission aus, um dein Abenteuer zu beginnen!</p>
        
        <div class="map-grid">
            <div class="quest-card" onclick="openModule('m1')">
                <h3>M1</h3>
                <p>Die Gründung Roms</p>
            </div>
            <div class="quest-card" onclick="openModule('m2')">
                <h3>M2</h3>
                <p>Die Expansion des Reiches</p>
            </div>
        </div>
    </div>

    <div id="module-page" class="hidden">
        <button class="btn-back" onclick="showStartPage()">← Zurück zur Übersicht</button>
        
        <h2 id="module-title">Modul Titel</h2>
        
        <div class="task-box">
            <h3>🎯 Aufgabenstellung</h3>
            <p id="module-task">Hier steht die Aufgabe...</p>
        </div>
        
        <div id="materials-container"></div>

        <button class="notebook-toggle" onclick="toggleNotebook()">📖 Notizbuch öffnen / schließen</button>
        
        <div id="notebook-container" class="notebook hidden">
            <h3>Dein Forschungs-Notizbuch</h3>
            <p id="notebook-question">Frage?</p>
            <textarea id="notebook-answer" placeholder="Schreibe deine Antwort hier hinein..."></textarea>
            <br>
            <button class="btn-save" onclick="saveAnswer()">💾 Antwort im Modul speichern</button>
        </div>
    </div>

</div>

<script>
    // --- DATEN DER MODULE ---
    const modulesData = {
        m1: {
            title: "M1: Die Gründung Roms",
            task: "1) <b>Erläutere</b> zunächst die Position der Geschichtswissenschaft zur Gründung Roms. Fülle dafür das Notizbuch aus.<br><br>2) Finde dich danach mit deinem Sitznachbarn oder Sitznachbarin zusammen und <b>vergleicht</b> eure Ergebnisse! Ergänzt euer Notizbuch gegebenenfalls.",
            question: "Deine Ausarbeitung zu Aufgabe 1:",
            isCustomLayout: true, 
            htmlContent: `
                <div class="material-box">
                    <h3>📊 D1 | Die Gründung Roms: Was die Geschichtswissenschaft berichtet</h3>
                    <div class="text-with-lines">
                        <div class="line-p"><div class="line-number">1</div><div class="line-text"><b>Die ersten Siedlungen:</b> Etwa um 1000 v. Chr. ließ sich das Volk der Latiner am Fluss Tiber in Mittelitalien nieder. Sie lebten als Ackerbauern und Hirten. Auf den Hügeln Palatin und Quirinal entstanden zu dieser Zeit kleine Dörfer aus einfachen Hütten.</div></div>
                        <div class="line-p"><div class="line-number">5</div><div class="line-text">Um etwa 700 v. Chr. existierten schon größere Dörfer auf allen sieben Hügeln. <b>Latiner und Etrusker:</b> Um etwa 800 v. Chr. wanderten Etrusker von Norden her in die Gegend ein. Die Herkunft dieses Volkes ist unbekannt. Sicher ist aber, dass die Etrusker Kontakt zur griechischen Hochkultur gehabt hatten.</div></div>
                        <div class="line-p"><div class="line-number">10</div><div class="line-text">Vielleicht stammten sie ursprünglich sogar aus Griechenland. Archäologische Fundstücke von soliden Steinhäusern, Schmuckstücken und Waffen beweisen, dass es sich um ein kulturell hoch entwickeltes Volk handelte. Die Etrusker siedelten zunächst auf der anderen Seite des Flusses Tiber.</div></div>
                        <div class="line-p"><div class="line-number">15</div><div class="line-text">Mit der Zeit aber gewannen sie die Oberhand über das Volk der Latiner, deren Hütten auf der gegenüberliegenden Flussseite auf den sieben Hügeln standen. <b>Die Gründung der Stadt Rom:</b> Wahrscheinlich waren es die Etrusker, die die Dörfer der Latiner zu einer echten Stadt verschmolzen und Rom gründeten.</div></div>
                        <div class="line-p"><div class="line-number">20</div><div class="line-text">Der Name „Rom" leitet sich vermutlich von dem etruskischen Königsgeschlecht der Ruma ab. Wann die Stadt Rom genau gegründet wurde, können die Wissenschaftler/innen nicht sagen.</div></div>
                    </div>
                </div>

                <div class="source-box">
                    <h3>📜 Q1 | Die Gründungssage Roms</h3>
                    <div class="text-with-lines">
                        <div class="line-p"><div class="line-number">1</div><div class="line-text"><b>Die Sage von der Gründung Roms im Jahr 753 v. Chr.:</b> Aeneas, der von der Göttin Aphrodite abstammte, konnte sich aus dem brennenden Troja retten. Nach zehn Jahren Irrfahrt landete er in Mittelitalien und heiratete eine dortige Königstochter. Seine Nachkommen wurden ebenfalls Könige.</div></div>
                        <div class="line-p"><div class="line-number">5</div><div class="line-text">Einer davon war Numitor, ein gutherziger Mann. Doch kurz nach seinem Amtsantritt setzte sein machtgieriger Bruder Amulius ihn ab und ernannte sich selbst zum König. Um Konkurrenz zu verhindern, tötete Amulius Numitors Sohn und zwang Numitors Tochter, Priesterin der Göttin Vesta zu werden...</div></div>
                        <div class="line-p"><div class="line-number">10</div><div class="line-text">denn diese Vestalinnen durften nicht heraten und keine Kinder bekommen. So herrschte Amulius viele Jahre. Eines Tages erschien Numitors Tochter am Fluss Tiber der Gott Mars. Die junge Priesterin wurde von ihm schwanger und brachte Zwillinge zur Welt. Als Amulius davon erfuhr, wollte er die Kinder töten.</div></div>
                        <div class="line-p"><div class="line-number">15</div><div class="line-text">Doch ihre Mutter legte sie in einen Korb, den sie in den Fluss Tiber setzte. Amulius ließ die Mutter der Kinder daraufhin ins Gefängnis werfen. Durch den Schutz ihres Vaters Mars ertranken die Zwillinge nicht und wurden ans Ufer getrieben. Als sie dort vor Hunger schrien, säugte eine Wölfin sie mit ihrer Milch.</div></div>
                        <div class="line-p"><div class="line-number">20</div><div class="line-text">Kurz darauf fand ein Hirte die Zwillinge und nahm sie mit nach Hause. Jahre später erfuhren die beiden - sie hießen Romulus und Remus - als junge Männer von ihrer wahren königlichen Herkunft. Sie riefen ihre Freunde zusammen, stürmten den Palast des Amulius und töteten ihn.</div></div>
                        <div class="line-p"><div class="line-number">25</div><div class="line-text">Dann befreiten sie ihre Mutter und setzten ihren alten Großvater Numitor wieder als König ein. Sie selbst wollten eine neue Stadt gründen, und zwar dort, wo die Wölfin sie gesäugt hatte. Durch einen Götterentscheid sollte Romulus der Gründer werden.</div></div>
                        <div class="line-p"><div class="line-number">30</div><div class="line-text">Als er die Stadtgrenze mit einem Pflug kennzeichnete, hüpfte Remus voller Spott über die Furche hinweg. Wutentbrannt rief Romulus: „So soll es jedem gehen, der meine Stadt angreift!" Und er brachte Remus um. Die neue Stadt nannte Romulus nach ihm selbst: Rom.</div></div>
                    </div>
                </div>

                <div class="image-container">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Lupa_capitolina_scultura_bronzea_del_V_secolo_a.C._o_del_medioevo_01.jpg" alt="Kapitolinische Wölfin" class="material-img">
                    <div class="image-caption">
                        Quelle: Kapitolinische Wölfin (Lupa Capitolina): Wölfin mit Romulus und Remus, Bronze, 12. Jahrhundert n. Chr. (laut C14-Datierung; nach traditioneller Sicht etruskisch aus dem 5. Jahrhundert v. Chr.), Zwillinge hinzugefügt im 15. Jahrhundert.
                    </div>
                </div>
            `
        },
        m2: {
            title: "M2: Die Expansion des Reiches",
            task: "Analysiere den Erfolg der römischen Armee. Notiere die wichtigsten Gründe im Notizbuch.",
            question: "Welche Faktoren machten die römische Armee so erfolgreich?",
            isCustomLayout: false,
            text: "Durch disziplinierte Legionen und geschickte Bündnisse breitete sich Rom über den gesamten Mittelmeerraum aus. Aus der kleinen Republik wurde ein riesiges Weltreich (Imperium Romanum).",
        }
    };

    let currentModuleId = "";

    // --- NAVIGATION ---
    function openModule(moduleId) {
        currentModuleId = moduleId;
        const data = modulesData[moduleId];

        // Titel, Aufgabe und Frage setzen
        document.getElementById('module-title').innerText = data.title;
        document.getElementById('module-task').innerHTML = data.task;
        document.getElementById('notebook-question').innerText = data.question;

        // Materialien flexibel laden
        const container = document.getElementById('materials-container');
        if (data.isCustomLayout) {
            container.innerHTML = data.htmlContent;
        } else {
            container.innerHTML = `
                <div class="material-box">
                    <h3>📜 Material & Quellen</h3>
                    <p>${data.text}</p>
                </div>
            `;
        }

        // Gespeicherte Antwort laden
        const savedAnswer = localStorage.getItem('answer_' + moduleId);
        document.getElementById('notebook-answer').value = savedAnswer ? savedAnswer : "";

        // Seiten umschalten
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('module-page').classList.remove('hidden');
        document.getElementById('notebook-container').classList.add('hidden');
    }

    function showStartPage() {
        document.getElementById('start-page').classList.remove('hidden');
        document.getElementById('module-page').classList.add('hidden');
    }

    // --- NOTIZBUCH LOGIK ---
    function toggleNotebook() {
        const notebook = document.getElementById('notebook-container');
        notebook.classList.toggle('hidden');
    }

    function saveAnswer() {
        const answerText = document.getElementById('notebook-answer').value;
        localStorage.setItem('answer_' + currentModuleId, answerText);
        alert("Deine Antwort wurde erfolgreich in deinem Notizbuch gespeichert!");
    }
</script>

</body>
</html>
